<!DOCTYPE html>

<html>
<head>
<title>Numbers Merge Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #111;
    color: white;
    margin: 0;
    user-select: none;
    touch-action: manipulation;
}

/* START SCREEN */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#startScreen h1 {
    font-size: 26px;
}

#startScreen button {
    padding: 16px 40px;
    font-size: 22px;
    border-radius: 15px;
    background: #2ecc71;
    color: white;
    border: none;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

/* MAIN */
#container {
    max-width: 400px;
    margin: auto;
    padding: 10px;
}

/* TOP BAR */
#topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

#score, #highScore {
    font-size: 16px;
}

/* BOARD */
#board {
    width: 95vw;
    max-width: 360px;
    aspect-ratio: 1;
    margin: auto;
    display: grid;
    gap: 8px;
    background: #222;
    padding: 10px;
    border-radius: 20px;
}

/* TILES */
.tile {
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    border-radius: 12px;
    background: #444;
    color: white;
    font-size: 18px;
    transition: transform 0.15s ease;
}

.slide {
    transform: scale(1.1);
}

/* CONTROLS */
#controls {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

button {
    padding: 12px 18px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
}

/* SELECT */
select {
    padding: 8px;
    border-radius: 8px;
    font-size: 14px;
}
</style>

</head>

<body>

<div id="startScreen">
    <h1>Numbers Merge Game</h1>
    <button onclick="startGame()">▶ Play Now</button>
</div>

<div id="container" style="display:none;">

<div id="topBar">
<select onchange="changeSize(this.value)">
<option value="3">3×3</option>
<option value="4" selected>4×4</option>
<option value="5">5×5</option>
</select>

<div>
<div id="score">Score: 0</div>
<div id="highScore">High Score: 0</div>
</div>
</div>

<div id="board"></div>

<div>Next: <span id="nextNum"></span></div>

<div id="controls">
<button onclick="restartGame()">🔄</button>
<button onclick="goHome()">🏠</button>
</div>

</div>

<script>
let size = 4;
let board = Array(size*size).fill(0);
let score = 0;
let highScore = localStorage.getItem("highScore_"+size) || 0;
let nextNumber = getRandom();

const boardDiv = document.getElementById("board");
let slideIndex = -1;

function startGame(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("container").style.display="block";
    draw();
}

function goHome(){
    document.getElementById("container").style.display="none";
    document.getElementById("startScreen").style.display="flex";
}

function changeSize(val){
    size=parseInt(val);
    highScore = localStorage.getItem("highScore_"+size) || 0;
    restartGame();
}

function getRandom(){
    let max = Math.max(...board);
    let powers = [];
    let value = 1;

    while (value <= Math.max(4, max)) {
        powers.push(value);
        value *= 2;
    }

    let r = Math.random();

    if (size == 3) {
        if (r < 0.85) return [1,2,2,4][Math.floor(Math.random()*4)];
        return powers[Math.floor(Math.random()*Math.min(3, powers.length))];
    }

    if (size == 4) {
        let last = powers.slice(-3);
        if (r < 0.8) return last[Math.floor(Math.random()*last.length)];
        return powers[Math.floor(Math.random()*powers.length)];
    }

    if (size == 5) {
        let last = powers.slice(-2);
        if (r < 0.6) return last[Math.floor(Math.random()*last.length)];
        return powers[Math.floor(Math.random()*powers.length)];
    }
}

function draw(){
    boardDiv.innerHTML="";
    boardDiv.style.gridTemplateColumns=`repeat(${size},1fr)`;

    board.forEach((num,i)=>{
        let tile=document.createElement("div");
        tile.className="tile";

        if(num!==0){
            tile.innerText=num;
            let hue=(Math.log2(num)*40)%360;
            tile.style.background=`hsl(${hue},70%,50%)`;
        }

        if(i===slideIndex){
            tile.classList.add("slide");
        }

        tile.onclick=()=>placeNumber(i);
        boardDiv.appendChild(tile);
    });

    document.getElementById("score").innerText="Score: "+score;
    document.getElementById("highScore").innerText="High Score: "+highScore;
    document.getElementById("nextNum").innerText=nextNumber;

    slideIndex=-1;
}

function placeNumber(i){
    if(board[i]!==0)return;

    board[i]=nextNumber;
    slideIndex=i;

    merge(i);

    nextNumber=getRandom();
    draw();
    checkGameOver();
}

function merge(i){
    let nbs=getNeighbors(i);
    for(let n of nbs){
        if(board[n]===board[i] && board[i]!==0){
            board[i]*=2;
            board[n]=0;

            slideIndex=i;

            score+=board[i];
            if(score>highScore){
                highScore=score;
                localStorage.setItem("highScore_"+size,highScore);
            }

            merge(i);
        }
    }
}

function getNeighbors(i){
    let l=[];
    if(i%size!==0)l.push(i-1);
    if(i%size!==size-1)l.push(i+1);
    if(i-size>=0)l.push(i-size);
    if(i+size<size*size)l.push(i+size);
    return l;
}

function checkGameOver(){
    if(!board.includes(0)){
        alert("Game Over! Score: "+score);
    }
}

function restartGame(){
    board=Array(size*size).fill(0);
    score=0;
    nextNumber=getRandom();
    draw();
}
</script>

</body>
</html>
