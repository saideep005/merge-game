<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number Merge Game</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: #879F84;
    font-family: Arial;
    overflow: hidden;
}
body { touch-action: manipulation; }

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

.container {
    width: 95vw;
    max-width: 420px;
    text-align: center;
    color: white;
}

.play-btn {
    padding: 15px;
    font-size: 18px;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.grid {
    display: grid;
    gap: 8px;
    width: 100%;
    margin-top: 10px;
    touch-action: none;
}

.cell {
    background: white;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    aspect-ratio: 1/1;
    font-weight: bold;
    font-size: clamp(28px, 8vw, 48px);
}

.n2{color:red;} .n4{color:orange;} .n8{color:gold;}
.n16{color:green;} .n32{color:cyan;} .n64{color:blue;}
.n128{color:purple;} .n256{color:pink;} .n512{color:lime;}
.n1024{color:yellow;} .n2048{color:black;}

button {
    margin: 5px;
    padding: 10px;
    border-radius: 6px;
    border: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- HOME -->
<div id="home" class="container">
    <h1>Number Merge Game</h1>
    <button class="play-btn" onclick="showMatrix()">▶ Play Now</button>
</div>

<!-- MATRIX SELECT -->
<div id="matrix" class="container" style="display:none;">
    <h2>Select Grid</h2>
    <button onclick="startGame(3)">3×3</button>
    <button onclick="startGame(4)">4×4</button>
    <button onclick="startGame(5)">5×5</button>
</div>

<!-- GAME -->
<div id="game" class="container" style="display:none;">

<h3>
Score: <span id="score">0</span> |
High: <span id="highScore">0</span>
</h3>

<div>
    <button onclick="init()">🔁</button>
    <button onclick="goHome()">🏠</button>
</div>

<div class="grid" id="grid"></div>

</div>

</div>

<script>

// FIX: correct references
const scoreEl = document.getElementById("score");
const highScoreEl = document.getElementById("highScore");

// FLOW
function showMatrix(){
    home.style.display="none";
    matrix.style.display="block";
}

function startGame(s){
    size=s;
    matrix.style.display="none";
    game.style.display="block";
    init();
}

function goHome(){
    game.style.display="none";
    matrix.style.display="none";
    home.style.display="block";
}

// GAME DATA
let size=5, board=[], score=0;
const grid=document.getElementById("grid");

// HIGH SCORE
function getKey(){ return "highScore_"+size; }
function loadHigh(){ return localStorage.getItem(getKey())||0; }
function saveHigh(v){ localStorage.setItem(getKey(),v); }

// INIT
function init(){
    grid.style.gridTemplateColumns=`repeat(${size},1fr)`;
    board=Array(size).fill().map(()=>Array(size).fill(0));
    score=0;
    addTile(); addTile();
    draw();
}

// TILE
function getNewTile(){ return Math.random()<0.9?2:4; }

// ADD TILE
function addTile(){
    let empty=[];
    for(let i=0;i<size;i++){
        for(let j=0;j<size;j++){
            if(board[i][j]==0) empty.push({i,j});
        }
    }
    if(!empty.length) return;
    let s=empty[Math.floor(Math.random()*empty.length)];
    board[s.i][s.j]=getNewTile();
}

// DRAW
function draw(){
    grid.innerHTML="";
    board.flat().forEach(val=>{
        let c=document.createElement("div");
        c.className="cell n"+val;
        c.textContent=val||"";
        grid.appendChild(c);
    });

    scoreEl.textContent=score;

    let high=loadHigh();
    if(score>high){ high=score; saveHigh(high); }
    highScoreEl.textContent=high;
}

// GAME OVER
function isGameOver(){
    for(let i=0;i<size;i++){
        for(let j=0;j<size;j++){
            if(board[i][j]===0) return false;
            if(j<size-1 && board[i][j]===board[i][j+1]) return false;
            if(i<size-1 && board[i][j]===board[i+1][j]) return false;
        }
    }
    return true;
}

// MERGE
function merge(row){
    let arr=row.filter(x=>x!=0);
    for(let i=0;i<arr.length-1;i++){
        if(arr[i]==arr[i+1]){
            arr[i]*=2;
            score+=arr[i];
            arr[i+1]=0;
        }
    }
    arr=arr.filter(x=>x!=0);
    while(arr.length<size) arr.push(0);
    return arr;
}

// MOVES
function moveLeft(){
    let moved=false;
    for(let i=0;i<size;i++){
        let n=merge(board[i]);
        if(board[i].toString()!=n.toString()) moved=true;
        board[i]=n;
    }
    if(moved){ addTile(); draw(); checkGameOver(); }
}

function moveRight(){
    let moved=false;
    for(let i=0;i<size;i++){
        let n=merge([...board[i]].reverse()).reverse();
        if(board[i].toString()!=n.toString()) moved=true;
        board[i]=n;
    }
    if(moved){ addTile(); draw(); checkGameOver(); }
}

function moveUp(){
    let moved=false;
    for(let j=0;j<size;j++){
        let col=board.map(r=>r[j]);
        let n=merge(col);
        for(let i=0;i<size;i++){
            if(board[i][j]!=n[i]) moved=true;
            board[i][j]=n[i];
        }
    }
    if(moved){ addTile(); draw(); checkGameOver(); }
}

function moveDown(){
    let moved=false;
    for(let j=0;j<size;j++){
        let col=board.map(r=>r[j]).reverse();
        let n=merge(col).reverse();
        for(let i=0;i<size;i++){
            if(board[i][j]!=n[i]) moved=true;
            board[i][j]=n[i];
        }
    }
    if(moved){ addTile(); draw(); checkGameOver(); }
}

// GAME OVER ALERT
function checkGameOver(){
    if(isGameOver()){
        setTimeout(()=> alert("Game Over 😢"),100);
    }
}

// SWIPE
let startX=0,startY=0,isDown=false;
grid.addEventListener("pointerdown",e=>{
    isDown=true; startX=e.clientX; startY=e.clientY;
});
grid.addEventListener("pointerup",e=>{
    if(!isDown) return;
    isDown=false;
    let dx=e.clientX-startX, dy=e.clientY-startY;
    let min=30;
    if(Math.abs(dx)>Math.abs(dy)){
        if(dx>min) moveRight();
        else if(dx<-min) moveLeft();
    } else {
        if(dy>min) moveDown();
        else if(dy<-min) moveUp();
    }
});

</script>

</body>
</html>
