<!DOCTYPE html>

<html>
<head>
<title>Merge Placement Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #111;
    color: white;
    margin: 0;
}

#container {
    max-width: 350px;
    margin: auto;
    padding-top: 20px;
}

#score, #highScore {
    font-size: 20px;
    margin: 5px;
}

#board {
    width: 90vw;
    max-width: 300px;
    aspect-ratio: 1;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 6px;
    background: #222;
    padding: 10px;
    border-radius: 15px;
}

.tile {
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    font-weight: bold;
    color: white;
    border-radius: 10px;
    background: #444;
}

#next {
    margin-top: 15px;
    font-size: 18px;
}

#nextNum {
    display: inline-block;
    padding: 10px 20px;
    background: #333;
    border-radius: 10px;
    margin-left: 8px;
    min-width: 40px;
}

#restartBtn {
    margin-top: 15px;
    padding: 10px 20px;
    display: none;
}
</style>

</head>

<body>

<div id="container">

<h2>Merge Game</h2>

<div id="score">Score: 0</div>
<div id="highScore">High Score: 0</div>

<div id="board"></div>

<div id="next">
Next: <span id="nextNum"></span>
</div>

<button id="restartBtn" onclick="restartGame()">Restart</button>

</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
let board = Array(9).fill(0);
let score = 0;

// ✅ HIGH SCORE (SAVED)
let highScore = localStorage.getItem("highScore") || 0;

let nextNumber = getRandom();

const boardDiv = document.getElementById("board");

let soundEnabled = false;

document.body.addEventListener("touchstart", () => {
    soundEnabled = true;
}, { once: true });

// RANDOM LOGIC
function getRandom() {
    let max = Math.max(...board);

    let powers = [];
    let value = 1;

    while (value <= Math.max(4, max)) {
        powers.push(value);
        value *= 2;
    }

    let last = powers.slice(-3);

    let r = Math.random();

    if (r < 0.8) {
        return last[Math.floor(Math.random() * last.length)];
    }

    return powers[Math.floor(Math.random() * powers.length)];
}

// DRAW
function draw() {
    boardDiv.innerHTML = "";

    board.forEach((num, index) => {
        let tile = document.createElement("div");

        tile.className = "tile";

        if (num !== 0) {
            tile.innerText = num;

            let hue = (Math.log2(num) * 40) % 360;
            tile.style.background = `hsl(${hue},70%,50%)`;
        }

        tile.onclick = () => placeNumber(index);
        boardDiv.appendChild(tile);
    });

    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("highScore").innerText = "High Score: " + highScore;
    document.getElementById("nextNum").innerText = nextNumber;
}

// SOUND
function playSound() {
    if (!soundEnabled) return;

    let sound = document.getElementById("clickSound");
    sound.currentTime = 0;
    sound.play().catch(() => {});
}

// PLACE
function placeNumber(index) {
    if (board[index] !== 0) return;

    playSound();

    board[index] = nextNumber;

    merge(index);

    nextNumber = getRandom();

    draw();
    checkGameOver();
}

// MERGE
function merge(index) {
    let neighbors = getNeighbors(index);

    for (let n of neighbors) {
        if (board[n] === board[index] && board[index] !== 0) {

            let newVal = board[index] * 2;

            board[index] = newVal;
            board[n] = 0;

            score += newVal;

            // ✅ SAVE HIGH SCORE
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("highScore", highScore);
            }

            merge(index);
        }
    }
}

// NEIGHBORS
function getNeighbors(i) {
    let list = [];

    if (i % 3 !== 0) list.push(i - 1);
    if (i % 3 !== 2) list.push(i + 1);
    if (i - 3 >= 0) list.push(i - 3);
    if (i + 3 < 9) list.push(i + 3);

    return list;
}

// GAME OVER
function checkGameOver() {
    if (!board.includes(0)) {
        document.getElementById("restartBtn").style.display = "block";
        setTimeout(() => {
            alert("Game Over! Score: " + score);
        }, 100);
    }
}

// RESTART
function restartGame() {
    board = Array(9).fill(0);
    score = 0;
    nextNumber = getRandom();
    document.getElementById("restartBtn").style.display = "none";
    draw();
}

// START
draw();
</script>

</body>
</html>
